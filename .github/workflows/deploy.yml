name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/**'

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: ${{ secrets.VM_USER }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ai-pinochle: ${{ steps.changes.outputs.ai-pinochle }}
      backgammon: ${{ steps.changes.outputs.backgammon }}
      bughouse: ${{ steps.changes.outputs.bughouse }}
      forbidden-island: ${{ steps.changes.outputs.forbidden-island }}
      lemonadestand: ${{ steps.changes.outputs.lemonadestand }}
      spades: ${{ steps.changes.outputs.spades }}
      telestrations: ${{ steps.changes.outputs.telestrations }}
      landing: ${{ steps.changes.outputs.landing }}
      infra-compose: ${{ steps.changes.outputs.infra-compose }}
      infra-caddyfile: ${{ steps.changes.outputs.infra-caddyfile }}
      infra-db-init: ${{ steps.changes.outputs.infra-db-init }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            ai-pinochle:
              - 'apps/ai-pinochle/**'
            backgammon:
              - 'apps/backgammon/**'
            bughouse:
              - 'apps/bughouse/**'
            forbidden-island:
              - 'apps/forbidden-island/**'
            lemonadestand:
              - 'apps/lemonadestand/**'
            spades:
              - 'apps/spades/**'
            telestrations:
              - 'apps/telestrations/**'
            landing:
              - 'apps/landing/**'
            infra-compose:
              - 'infra/docker-compose.yml'
            infra-caddyfile:
              - 'infra/Caddyfile'
            infra-db-init:
              - 'infra/init-databases.sql'

  test-landing:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.landing == 'true'
    defaults:
      run:
        working-directory: apps/landing
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/landing/package-lock.json
      - run: npm ci
      - run: npm test

  deploy:
    needs: [detect-changes, test-landing]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      (
      needs.detect-changes.outputs.ai-pinochle == 'true' ||
      needs.detect-changes.outputs.backgammon == 'true' ||
      needs.detect-changes.outputs.bughouse == 'true' ||
      needs.detect-changes.outputs.forbidden-island == 'true' ||
      needs.detect-changes.outputs.lemonadestand == 'true' ||
      needs.detect-changes.outputs.spades == 'true' ||
      needs.detect-changes.outputs.telestrations == 'true' ||
      needs.detect-changes.outputs.landing == 'true' ||
      needs.detect-changes.outputs.infra-compose == 'true' ||
      needs.detect-changes.outputs.infra-caddyfile == 'true' ||
      needs.detect-changes.outputs.infra-db-init == 'true'
      )
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to VM
        run: |
          tar czf /tmp/gamelibrary.tar.gz \
            --exclude='node_modules' --exclude='.git' \
            --exclude='__pycache__' --exclude='.venv' \
            --exclude='*.pyc' --exclude='dist' \
            --exclude='build' --exclude='bin' \
            --exclude='obj' --exclude='.env' \
            apps/ infra/
          scp -i ~/.ssh/deploy_key \
            /tmp/gamelibrary.tar.gz ${{ env.VM_USER }}@${{ env.VM_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            'tar xzf /tmp/gamelibrary.tar.gz -C /opt/gamelibrary'

      - name: Set GIT_SHA for build
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cd /opt/gamelibrary/infra && \
             sed -i '/^GIT_SHA=/d' .env && \
             echo 'GIT_SHA=${{ github.sha }}' >> .env"

      - name: Determine which services to rebuild
        id: services
        run: |
          SERVICES=""

          # 1) App code changes — rebuild that app
          [ "${{ needs.detect-changes.outputs.ai-pinochle }}" == "true" ] && SERVICES="$SERVICES ai-pinochle"
          [ "${{ needs.detect-changes.outputs.backgammon }}" == "true" ] && SERVICES="$SERVICES gnubg backgammon"
          [ "${{ needs.detect-changes.outputs.bughouse }}" == "true" ] && SERVICES="$SERVICES bughouse"
          [ "${{ needs.detect-changes.outputs.forbidden-island }}" == "true" ] && SERVICES="$SERVICES forbidden-island"
          [ "${{ needs.detect-changes.outputs.lemonadestand }}" == "true" ] && SERVICES="$SERVICES lemonadestand"
          [ "${{ needs.detect-changes.outputs.spades }}" == "true" ] && SERVICES="$SERVICES spades"
          [ "${{ needs.detect-changes.outputs.telestrations }}" == "true" ] && SERVICES="$SERVICES telestrations"

          # 2) docker-compose.yml changed — parse the diff to find affected services
          #    instead of rebuilding everything
          if [ "${{ needs.detect-changes.outputs.infra-compose }}" == "true" ]; then
            DIFF=$(git diff HEAD~1 HEAD -- infra/docker-compose.yml)
            COMPOSE_SERVICES=""
            for svc in ai-pinochle gnubg backgammon bughouse forbidden-island lemonadestand spades telestrations caddy postgres; do
              # Only match actual change lines (+ or -), not diff context
              if echo "$DIFF" | grep -qE "^[+-].*${svc}"; then
                COMPOSE_SERVICES="$COMPOSE_SERVICES $svc"
              fi
            done
            # If compose changed but no specific services identified (e.g., volumes
            # or top-level keys), fall back to rebuilding all app services
            if [ -z "$COMPOSE_SERVICES" ] && [ -n "$DIFF" ]; then
              COMPOSE_SERVICES="ai-pinochle gnubg backgammon bughouse forbidden-island lemonadestand spades telestrations"
            fi
            SERVICES="$SERVICES $COMPOSE_SERVICES"
            echo "Compose-affected services: $COMPOSE_SERVICES"
          fi

          # 3) init-databases.sql only runs on first postgres init — no rebuild needed.
          #    The file is synced to the VM but running containers are unaffected.

          # Deduplicate and trim
          SERVICES=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
          echo "list=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Deploying: $SERVICES"

      - name: Build and restart services
        if: steps.services.outputs.list != ''
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cd /opt/gamelibrary/infra && \
             docker compose build ${{ steps.services.outputs.list }} && \
             docker compose up -d ${{ steps.services.outputs.list }}"

      - name: Reload Caddy if Caddyfile changed
        if: needs.detect-changes.outputs.infra-caddyfile == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cd /opt/gamelibrary/infra && \
             docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile"

      - name: Verify containers are running
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            'docker ps --format "table {{.Names}}\t{{.Status}}" | grep -v "Restarting" || true'
          # Check for any restarting containers (indicates a problem)
          RESTARTING=$(ssh -i ~/.ssh/deploy_key \
            ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            'docker ps --format "{{.Names}} {{.Status}}" | grep "Restarting" || true')
          if [ -n "$RESTARTING" ]; then
            echo "::error::Containers are crash-looping: $RESTARTING"
            exit 1
          fi
