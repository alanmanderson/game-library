<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #e5e5ea;
            --radius: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Header ─────────────────────────────────── */

        .header {
            text-align: center;
            padding: 64px 24px 16px;
            max-width: 640px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ── Grid ───────────────────────────────────── */

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1080px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Card ───────────────────────────────────── */

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card:active {
            transform: translateY(-2px);
        }

        .card--coming-soon {
            opacity: 0.65;
            pointer-events: none;
        }

        .coming-soon-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.92);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 4px 10px;
            border-radius: 6px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* ── Icon area ──────────────────────────────── */

        .card-icon {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-icon svg {
            width: 64px;
            height: 64px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.12));
        }

        /* ── Content ────────────────────────────────── */

        .card-body {
            padding: 20px 24px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 650;
            letter-spacing: -0.01em;
        }

        .card-genre {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-top: -4px;
        }

        .card-desc {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        /* ── Metadata ───────────────────────────────── */

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
            padding-top: 4px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 5px 11px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .tag svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            opacity: 0.55;
        }

        .tag--bot {
            color: #34793a;
            background: #e8f5e9;
        }

        /* ── Footer ─────────────────────────────────── */

        .footer {
            text-align: center;
            padding: 0 24px 48px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ── Responsive ─────────────────────────────── */

        @media (max-width: 680px) {
            .header { padding: 48px 20px 8px; }
            .header h1 { font-size: 32px; }
            .header p { font-size: 16px; }
            .grid {
                grid-template-columns: 1fr;
                padding: 32px 16px 64px;
                gap: 16px;
            }
            .card-icon { height: 140px; }
        }
    </style>
</head>

function renderCard(game) {
    const card = document.createElement("a");
    card.href = game.url;
    card.className = "card" + (game.comingSoon ? " card--coming-soon" : "");

    const [c1, c2] = game.color;

    card.innerHTML = `
        ${game.comingSoon ? '<span class="coming-soon-badge">Coming Soon</span>' : ""}
        <div class="card-icon" style="background: linear-gradient(135deg, ${c1}, ${c2})">
            ${icons[game.icon]}

        <div class="card-body">
            <div class="card-genre">${game.genre}</div>
            <div class="card-title">${game.name}</div>
            <div class="card-desc">${game.desc}</div>
            <div class="card-meta">
                <span class="tag">${tagIcons.players} ${game.players}</span>
                <span class="tag">${tagIcons.duration} ${game.duration}</span>
                ${game.bot ? `<span class="tag tag--bot">${tagIcons.bot} AI opponent</span>` : ""}
            </div>
        </div>
    `;

    return card;
}
