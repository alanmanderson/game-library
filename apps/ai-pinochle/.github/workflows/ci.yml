name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install server deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q

  shared-tests:
    name: Shared tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run shared unit tests
        run: npm run test --workspace=shared

  web-build:
    name: Web build (tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Type-check + build web
        run: npm run build --workspace=web

      - name: Upload built web assets (for deploy job)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  mobile-typecheck:
    name: Mobile typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    # Not a merge gate — surfaces typing issues in mobile without blocking
    # web/server work when mobile-only deps drift.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Type-check mobile
        working-directory: mobile
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: [server-tests, shared-tests, web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download built web assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Diagnose variable/secret scope
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "---- vars context keys ----"
          echo "$VARS_JSON" | jq 'keys'
          echo "---- vars.AZURE_VM_HOST length ----"
          echo -n "${{ vars.AZURE_VM_HOST }}" | wc -c
          echo "---- secrets.AZURE_VM_HOST set? (non-empty => set as a secret) ----"
          if [ -n "${{ secrets.AZURE_VM_HOST }}" ]; then echo "YES (it was stored as a secret, not a variable)"; else echo "no"; fi

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
          # Accept either a variable (preferred) or a secret (in case it was
          # stored on the wrong page by mistake). Secrets get masked in logs.
          HOST: ${{ vars.AZURE_VM_HOST || secrets.AZURE_VM_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::error::AZURE_VM_HOST is empty. Set it in Settings → Secrets and variables → Actions → Variables tab."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Copy files to VM
        env:
          HOST: ${{ vars.AZURE_VM_HOST }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          REMOTE="azureuser@${HOST}:/opt/pinochle"

          # Web static bundle
          scp $SSH_OPTS -r web/dist "${REMOTE}/web-dist"

          # Server source + Docker glue
          scp $SSH_OPTS -r server "${REMOTE}/server"
          scp $SSH_OPTS Dockerfile docker-compose.yml Caddyfile "${REMOTE}/"

      - name: Rebuild and restart on VM
        env:
          HOST: ${{ vars.AZURE_VM_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "azureuser@${HOST}" \
            "cd /opt/pinochle && docker build -t pinochle-server:latest . && docker compose up -d"
