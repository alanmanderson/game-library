  <!-- Black spade suit, bottom-right corner -->
  <path d="M44,43 C41,45.5 38,48 38,50 C38,52 40,53 42,51.5 L41.5,54 L46.5,54 L46,51.5 C48,53 50,52 50,50 C50,48 47,45.5 44,43 Z" fill="#1a1a2e"/>
