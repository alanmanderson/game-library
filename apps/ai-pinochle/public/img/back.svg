<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 112" role="img" aria-label="Card back">
  <!-- Flat burgundy body -->
  <rect width="80" height="112" rx="6" fill="#7A1F2B"/>
  <!-- Brass inner frame -->
  <rect x="4" y="4" width="72" height="104" rx="4.5" fill="none" stroke="#C9871F" stroke-width="1" opacity="0.7"/>

  <!-- Centered monogram: spade + heart pair, cream on burgundy -->
  <g transform="translate(24 34)" fill="#FAF6EF">
    <!-- Spade -->
    <path d="M16 0
             C12 4, 8 7, 8 12
             C8 15, 10 16.5, 12.5 15.5
             L11.5 19
             L20.5 19
             L19.5 15.5
             C22 16.5, 24 15, 24 12
             C24 11, 23.8 10, 23.4 9.2
             C22.8 10, 22 10.4, 21 10
             C20 9.6, 19.5 8.7, 19.7 7.8
             C19.9 6.9, 20.6 6.3, 21.5 6.4
             C20.5 4, 18 2, 16 0 Z"/>
    <!-- Heart -->
    <path d="M16 26
             C14 24, 10 23, 10 27
             C10 30, 14 33, 16 35
             C18 33, 22 30, 22 27
             C22 23, 18 24, 16 26 Z"/>
  </g>
</svg>
