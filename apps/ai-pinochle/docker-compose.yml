services:
  fastapi:
    image: pinochle-server:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    depends_on:
      - redis

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - fastapi

  # Pub/sub bus for multi-instance WebSocket fan-out.
  # Point FastAPI at it by setting REDIS_URL=redis://redis:6379/0 in .env.
  # Leaving REDIS_URL unset keeps the server in single-instance in-process
  # broadcast mode — the Redis container still runs but is ignored.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"

volumes:
  caddy_data:
  caddy_config:
