services:
  gnubg:
    build: .
    image: backgammon-gnubg:latest
    container_name: gnubg
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
