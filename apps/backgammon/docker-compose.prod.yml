services:
  fastapi:
    image: backgammon-server:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - fastapi

volumes:
  caddy_data:
  caddy_config:
