services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: backgammon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: backgammon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backgammon"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    image: backgammon-server:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://backgammon:${POSTGRES_PASSWORD}@db:5432/backgammon
      DATABASE_URL_SYNC: postgresql://backgammon:${POSTGRES_PASSWORD}@db:5432/backgammon
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    depends_on:
      - fastapi

volumes:
  pgdata:
  caddy_data:
  caddy_config:
