name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          JWT_SECRET: test-secret-for-ci
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          tags: backgammon-server:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and compress Docker image
        run: |
          docker save backgammon-server:latest | zstd -T0 -3 > /tmp/backgammon-server.tar.zst

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/backgammon-server.tar.zst
          retention-days: 1
          compression-level: 0

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-image]
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$VM_HOST" ]; then
            echo "::error::SSH_PRIVATE_KEY or VM_HOST secret is missing. Check repository secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Transfer artifacts to VM
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SCP="scp -i ~/.ssh/id_deploy"
          SSH="ssh -i ~/.ssh/id_deploy"

          $SCP /tmp/backgammon-server.tar.zst "$REMOTE":/tmp/
          $SCP docker-compose.prod.yml "$REMOTE":/opt/backgammon/docker-compose.yml
          $SCP Caddyfile "$REMOTE":/opt/backgammon/
          $SSH "$REMOTE" "rm -rf /opt/backgammon/web-dist"
          $SCP -r frontend/dist "$REMOTE":/opt/backgammon/web-dist

      - name: Tag previous image for rollback
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/id_deploy $REMOTE"
          $SSH "docker tag backgammon-server:latest backgammon-server:previous 2>/dev/null || true"

      - name: Deploy on VM
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/id_deploy $REMOTE"
          $SSH "zstd -d /tmp/backgammon-server.tar.zst -o /tmp/backgammon-server.tar && docker load < /tmp/backgammon-server.tar && rm /tmp/backgammon-server.tar.zst /tmp/backgammon-server.tar"
          $SSH "cd /opt/backgammon && docker compose run --rm fastapi alembic upgrade head"
          $SSH "cd /opt/backgammon && docker compose up -d --force-recreate"
          echo "Deployment complete!"

      - name: Verify deployment
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/id_deploy $REMOTE"
          echo "Waiting for service to start..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            if RESULT=$($SSH "cd /opt/backgammon && docker compose exec -T fastapi curl -sf http://localhost:8000/api/health" 2>&1); then
              echo "Health check passed: $RESULT"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying..."
          done
          echo "::error::Health check failed after 6 attempts!"
          exit 1

      - name: Clean up old Docker images
        if: success()
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/id_deploy $REMOTE"
          echo "Pruning unused Docker images and build cache..."
          $SSH "docker image prune -f"
          $SSH "docker builder prune -f --keep-storage=1g"

      - name: Rollback on failure
        if: failure()
        env:
          REMOTE: azureuser@${{ secrets.VM_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/id_deploy $REMOTE"
          echo "Rolling back to previous image..."
          if $SSH "docker image inspect backgammon-server:previous > /dev/null 2>&1"; then
            $SSH "docker tag backgammon-server:previous backgammon-server:latest"
            $SSH "cd /opt/backgammon && docker compose down && docker compose up -d"
            echo "Rollback complete. Previous version restored."
          else
            echo "::warning::No previous image found. Cannot rollback automatically."
          fi
