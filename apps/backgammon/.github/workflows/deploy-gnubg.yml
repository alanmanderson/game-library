name: Deploy gnubg service

# Only runs when the gnubg service itself changes, or when manually
# triggered. An ordinary app deploy (backend/frontend) never touches
# the gnubg service.
on:
  push:
    branches: [main]
    paths:
      - 'gnubg/**'
      - '.github/workflows/deploy-gnubg.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: gnubg/requirements.txt

      - name: Install dependencies
        working-directory: gnubg
        run: pip install -r requirements.txt

      - name: Run parser tests
        working-directory: gnubg
        # Engine tests auto-skip when gnubg isn't installed on the runner.
        run: pytest -v

  build-image:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: gnubg
          file: gnubg/Dockerfile
          platforms: linux/arm64
          tags: backgammon-gnubg:latest
          load: true
          cache-from: type=gha,scope=gnubg
          cache-to: type=gha,mode=max,scope=gnubg

      - name: Save and compress Docker image
        run: |
          docker save backgammon-gnubg:latest | zstd -T0 -3 > /tmp/backgammon-gnubg.tar.zst

      - name: Upload Docker image
        uses: actions/upload-artifact@v7
        with:
          name: gnubg-image
          path: /tmp/backgammon-gnubg.tar.zst
          retention-days: 1
          compression-level: 0

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-image]
    steps:
      - uses: actions/checkout@v6

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: gnubg-image
          path: /tmp/

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          GNUBG_VM_HOST: ${{ secrets.GNUBG_VM_HOST }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$VM_HOST" ] || [ -z "$GNUBG_VM_HOST" ]; then
            echo "::error::SSH_PRIVATE_KEY, VM_HOST, or GNUBG_VM_HOST secret is missing."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Jump host key — we can't ssh-keyscan an internal IP directly.
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Disable strict host checking for the internal target; the VNet
          # is the trust boundary.
          cat >> ~/.ssh/config <<EOF
          Host jump
            HostName $VM_HOST
            User azureuser
            IdentityFile ~/.ssh/id_deploy

          Host gnubg
            HostName $GNUBG_VM_HOST
            User azureuser
            ProxyJump jump
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Transfer artifacts to vm-gnubg
        run: |
          SSH_OPTS="-i ~/.ssh/id_deploy"
          scp $SSH_OPTS /tmp/backgammon-gnubg.tar.zst gnubg:/tmp/
          scp $SSH_OPTS gnubg/docker-compose.yml gnubg:/opt/gnubg/

      - name: Tag previous image for rollback
        run: |
          ssh -i ~/.ssh/id_deploy gnubg "docker tag backgammon-gnubg:latest backgammon-gnubg:previous 2>/dev/null || true"

      - name: Deploy on vm-gnubg
        run: |
          ssh -i ~/.ssh/id_deploy gnubg "\
            zstd -d /tmp/backgammon-gnubg.tar.zst -o /tmp/backgammon-gnubg.tar && \
            docker load < /tmp/backgammon-gnubg.tar && \
            rm /tmp/backgammon-gnubg.tar.zst /tmp/backgammon-gnubg.tar && \
            cd /opt/gnubg && \
            docker compose up -d --force-recreate"

      - name: Verify deployment
        run: |
          echo "Waiting for service to start..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            if RESULT=$(ssh -i ~/.ssh/id_deploy gnubg "curl -sf http://localhost:8001/health" 2>&1); then
              echo "Health check passed: $RESULT"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying..."
          done
          echo "::error::Health check failed after 6 attempts!"
          exit 1

      - name: Clean up old Docker images
        if: success()
        run: |
          ssh -i ~/.ssh/id_deploy gnubg "docker image prune -f"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous image..."
          if ssh -i ~/.ssh/id_deploy gnubg "docker image inspect backgammon-gnubg:previous > /dev/null 2>&1"; then
            ssh -i ~/.ssh/id_deploy gnubg "\
              docker tag backgammon-gnubg:previous backgammon-gnubg:latest && \
              cd /opt/gnubg && docker compose down && docker compose up -d"
            echo "Rollback complete."
          else
            echo "::warning::No previous image found. Cannot rollback automatically."
          fi
