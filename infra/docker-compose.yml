services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped
    depends_on:
      - ai-pinochle
      - backgammon
      - bughouse
      - forbidden-island
      - lemonadestand
      - spades
      - telestrations

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    restart: unless-stopped

  # auth:
  #   build: ../services/auth
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth
  #     JWT_SECRET: ${JWT_SECRET}
  #     GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  #     GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

  ai-pinochle:
    build: ../apps/ai-pinochle
    environment:
      DATABASE_URL: ${AI_PINOCHLE_DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  backgammon:
    build: ../apps/backgammon
    environment:
      DATABASE_URL: ${BACKGAMMON_DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  bughouse:
    build: ../apps/bughouse
    environment:
      DATABASE_URL: ${BUGHOUSE_DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  forbidden-island:
    build: ../apps/forbidden-island
    environment:
      PORT: "3000"
    restart: unless-stopped

  lemonadestand:
    build: ../apps/lemonadestand
    environment:
      ASPNETCORE_URLS: http://+:5000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  spades:
    build: ../apps/spades
    environment:
      FLASK_APP: app
      PORT: "5000"
    restart: unless-stopped

  telestrations:
    build: ../apps/telestrations
    environment:
      PORT: "8080"
    restart: unless-stopped

volumes:
  caddy_data:
  postgres_data:
