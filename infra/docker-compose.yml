services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - ../apps/landing:/srv/landing:ro
    restart: unless-stopped
    depends_on:
      - ai-pinochle
      - backgammon
      - bughouse
      - forbidden-island
      - lemonadestand
      - spades
      - telestrations
      - logservice

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    restart: unless-stopped

  logservice:
    build: ../services/logservice
    environment:
      API_KEY: ${LOG_SERVICE_API_KEY}
      LOG_LEVEL: warn
      DB_PATH: /data/logs.db
    volumes:
      - logservice_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # auth:
  #   build: ../services/auth
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth
  #     JWT_SECRET: ${JWT_SECRET}
  #     GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  #     GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

  ai-pinochle:
    build:
      context: ../apps/ai-pinochle
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GIT_SHA: ${GIT_SHA}
    environment:
      DATABASE_URL: ${AI_PINOCHLE_DATABASE_URL}
      SECRET_KEY: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ALLOWED_ORIGINS: https://pinochle.games.alanmanderson.com
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

  gnubg:
    build: ../apps/backgammon/gnubg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backgammon:
    build:
      context: ../apps/backgammon
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GIT_SHA: ${GIT_SHA}
    environment:
      DATABASE_URL: ${BACKGAMMON_DATABASE_URL}
      DATABASE_URL_SYNC: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/backgammon
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GNUBG_URL: http://gnubg:8001
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    depends_on:
      - postgres
      - gnubg
    restart: unless-stopped

  bughouse:
    build:
      context: ../apps/bughouse
      args:
        GIT_SHA: ${GIT_SHA}
    environment:
      BUGHOUSE_DATABASE_URL: ${BUGHOUSE_DATABASE_URL}
      BUGHOUSE_JWT_SECRET_KEY: ${JWT_SECRET}
      BUGHOUSE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      BUGHOUSE_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

  forbidden-island:
    build:
      context: ../apps/forbidden-island
      args:
        GIT_SHA: ${GIT_SHA}
    environment:
      PORT: "3000"
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    restart: unless-stopped

  lemonadestand:
    build:
      context: ../apps/lemonadestand
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GIT_SHA: ${GIT_SHA}
    environment:
      ASPNETCORE_URLS: http://+:5000
      Jwt__Secret: ${JWT_SECRET}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    restart: unless-stopped

  spades:
    build:
      context: ../apps/spades
      args:
        GIT_SHA: ${GIT_SHA}
    environment:
      FLASK_APP: app
      PORT: "5000"
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    restart: unless-stopped

  telestrations:
    build:
      context: ../apps/telestrations
      args:
        GIT_SHA: ${GIT_SHA}
    environment:
      PORT: "8080"
      LOG_SERVICE_URL: http://logservice:3100/api/ingest
      LOG_SERVICE_API_KEY: ${LOG_SERVICE_API_KEY}
    restart: unless-stopped

volumes:
  caddy_data:
  postgres_data:
  logservice_data:
